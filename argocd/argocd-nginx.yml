apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-bitnami-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:aburayyanjeffry/gitops-101.git'
    targetRevision: main
    path: charts/nginx     # Tells Argo CD where to look for Chart.yaml
    
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: nginx-ingress

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
